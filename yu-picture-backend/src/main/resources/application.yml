server:
  port: 8123
  servlet:
    context-path: /api
spring:
  application:
    name: yu-picture-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yu_picture
    username: root
    password: 20041115
#mabatis-plus配置
mybatis-plus:
    configuration:
        log-impl: org.apache.ibatis.logging.stdout.StdOutImpl #仅在开发环境打印日志
    global-config:
        db-config:
          logic-delete-field: isDelete #全局逻辑删除字段名
          logic-delete-value: 1 #全局逻辑删除值（表示已删除）
          logic-not-delete-value: 0 #全局逻辑未删除值（表示未删除）
#接口文档配置
knife4j:
  enable: true
  openapi:
    title: 接口文档
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.yupi.yupicturebackend.controller

